# Installation method Home Assistant OS
# Core 2026.4.4
# Supervisor 2026.04.2
# Operating System 17.2
# Frontend 20260325.8
# ESPHome 2026.4.3
# Raspberry Pi Pico W (RP2040)
#

esphome:
  name: picodash
  friendly_name: picodash

rp2040:
  board: rpipicow

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret picodash_api_key

ota:
  - platform: esphome
    password: !secret picodash_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.68.111
  manual_ip: 
    static_ip: 192.168.68.111
    gateway: 192.168.68.1
    subnet: 255.255.255.0
  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: !secret picodash_ap_ssid
    password: !secret picodash_ap_password


####  Hardware

output:
  - platform: rp2040_pwm
    id: backlight_output
    pin: GPIO4

light:
  - platform: monochromatic
    id: display_backlight
    name: Screen Backlight Enable
    output: backlight_output
    restore_mode: ALWAYS_ON

#### Display ################

spi:
  id: spi_bus
  clk_pin: GPIO18
  mosi_pin: GPIO19
  miso_pin: GPIO16  

display:
  - platform: mipi_spi
    model: ILI9341
    id: my_display
    spi_id: spi_bus
    dc_pin: GPIO02
    reset_pin: GPIO03
    cs_pin: GPIO17
    color_order: RGB
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never
    show_test_card: False
    #rotation: 0

touchscreen:
  - platform: xpt2046
    id: my_touchscreen
    cs_pin: GPIO21
    calibration: 
      x_min: 281
      x_max: 3848
      y_min: 347
      y_max: 3878
    display: my_display
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: true
    on_release:
    - if:
        condition: lvgl.is_paused
        then:
          - logger.log: "LVGL resuming"
          - light.turn_on: display_backlight
          - lvgl.resume:
          - lvgl.widget.redraw:

lvgl:
  buffer_size: 25%
  rotation: 0
  displays:
    my_display
  touchscreens:
    my_touchscreen
  on_idle:
    - timeout: 100s
      then:
        - light.turn_off: display_backlight
        - lvgl.pause:
  # theme:
  #   dark_mode: true
  top_layer:
    widgets:
      - label:
          id: label_top
          x: 120
          y: 0
          text: "LVGL9.5"
          text_font: montserrat_14
  pages:
    - id: main_page
      widgets:
        - button:
            x: 0
            y: 50%
            width: 50
            height: 50
            checkable: false
            widgets:
              - label:
                  align: CENTER
                  text: "0"
                  text_color: 0x0
                  text_font: montserrat_24
            on_press:
              - lvgl.display.set_rotation:
                  id: my_lvgl
                  rotation: 0
        - button:
            id: button_90
            x: 50
            y: 50%
            width: 50
            height: 50
            checkable: false
            widgets:
              - label:
                  align: CENTER
                  text: "90"
                  text_color: 0x0
                  text_font: montserrat_24
            on_press:
              - lvgl.display.set_rotation:
                  id: my_lvgl
                  rotation: 90
        - button:
            id: button_180
            x: 100
            y: 50%
            width: 50
            height: 50
            checkable: false
            widgets:
              - label:
                  align: CENTER
                  text: "180"
                  text_color: 0x0
                  text_font: montserrat_24
            on_press:
              - lvgl.display.set_rotation:
                  id: my_lvgl
                  rotation: 180
        - button:
            id: button_27
            x: 150
            y: 50%
            width: 50
            height: 50
            checkable: false
            widgets:
              - label:
                  align: CENTER
                  text: "270"
                  text_color: 0x0
                  text_font: montserrat_24
            on_press:
              - lvgl.display.set_rotation:
                  id: my_lvgl
                  rotation: 270
        - slider:
            id: slider1
            x: 10
            y: 50
            width: 90%
            min_value: 0
            max_value: 100
            value: 50
            on_value:
              - lvgl.label.update:
                  id: lbl_slider1
                  text:
                    format: "%d"
                    args: [int(x)]
        - label:
            id: lbl_slider1
            x: 158
            y: 80
            text: "50"
            text_color: 0x0
            text_font: montserrat_24
