# Installation method: Home Assistant OS
# Core: 2026.7.3
# Supervisor: 2026.07.3
# Operating System: 18.1
# Frontend: 220260624.6
# ESPHome Current version: 2026.7.2
#


# Board: Generic ESP32-S3 Board (Generic)
# Definition: definitions/boards/generic-esp32s3/manifest.yaml

esphome:
  name: round146
  friendly_name: round146
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    # We don't use touch for this demo, but this initialises it
    # You can see touch updates in the log
    - priority: -100
      then:
        - delay: 300ms
        - lambda: |-
            id(touch_glue).begin();
            
esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    components:
      - name: espressif/esp_lcd_touch_spd2010
        ref: 2.0.0
      - name: espressif/esp_lcd_touch
        ref: 1.2.1
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      #CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      #CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret round146_api

ota:
  - platform: esphome

network:
  enable_ipv6: false


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #use_address: 192.168.68.122
  manual_ip: 
    static_ip: 192.168.68.122
    gateway: 192.168.68.1
    subnet: 255.255.255.0
  ap:
    ssid: !secret round146_ap_ssid
    password: !secret round146_ap_pwd
  post_connect_roaming: false

web_server:
    
captive_portal:

  
# This fetches a long sequence of numbers and puts them into $INIT_SEQUENCE
# which we use later on. This avoids having that long sequence of numbers in this
# code file
packages:
  remote_package_shorthand: github://coofercat/waveshare-lcd-1.46-touch/init_sequence.yaml@main

# This pulls in the spd2010_glue touch driver
external_components:
  - source: github://coofercat/waveshare-lcd-1.46-touch@main
  - source: github://Djelibeybi/esphome-qmi8658@main
    components: [qmi8658]


time:
    - platform: homeassistant
      id: local_time
      timezone: America/New_York

#used to check free ram, cpu.
debug:
  update_interval: 90s

#########################
# Audio Setup
#########################

i2s_audio:
  - id: i2s_output
    # i2s_output data pin is gpio10
    i2s_lrclk_pin:
      number: GPIO38
    i2s_bclk_pin:
      number: GPIO48

  - id: i2s_input
    # data line is GPIO15
    i2s_lrclk_pin:
      number: GPIO2
    i2s_bclk_pin:
      number: GPIO15

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_input
    i2s_din_pin: GPIO39
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit
    
speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_output
    i2s_dout_pin: GPIO47
    dac_type: external
    channel: mono

##############################
# local Voice Assistant Setup
#############################
media_player:
  - platform:  speaker
    name: "Media Player"
    id: my_player
    volume_initial: 50%
    volume_min: 10%
    volume_max: 100%
    volume_increment: 5%
    announcement_pipeline:
      speaker: i2s_audio_speaker
      format: FLAC         # Audio format sent from Home Assistant (FLAC, MP3, OPUS, WAV, or NONE)
      sample_rate: 48000    # Sample rate supported by your hardware
      num_channels: 1       # 1 for mono, 2 for stereo
    # on_announcement:
    #   if:
    #     condition:
    #       - microphone.is_capturing:
    #     then:
    #       - micro_wake_word.stop
    #       - wait_until: 
    #           - not:
    #               voice_assistant.is_running

####### Note: See sensor for Media Player (volume) control below
    
micro_wake_word:
  id: wake_word
  models:
    - model: okay_nabu
      id: model_nabu
    # - model: hey_jarvis
    #   id: model_jarvis
    # - model: github://esphome/micro-wake-word-models/models/v2/alexa.json
    #   id: model_alexa
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
            
voice_assistant:
  microphone: i2s_microphone
  micro_wake_word: wake_word
  media_player:  my_player
  noise_suppression_level: 0
  auto_gain: 31dBFS
  volume_multiplier: 3.5
  # Screen hooks (update response + phases)
  on_listening:
    - logger.log: "VA: listening for command"
    - lvgl.label.update: 
          id: lbl_listen
          text: "Listening"
  on_idle:
    - lvgl.label.update: 
          id: lbl_listen
          text: "Waiting"
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - micro_wake_word.start:   #if mww used
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
  on_error:
    then:
      - micro_wake_word.start: 
      - lvgl.label.update: 
            id: lbl_listen
            text: "Error"
      - wait_until: 
          - not:
              media_player.is_announcing:

#####################################################
# Parts of the Video98 IMU sensors are commented out
####################################################

i2c:
  sda: GPIO11
  scl: GPIO10
  scan: true
    
# Create the main QMI8658 component
qmi8658:
  id: imu_sensor # Required, can be any valid ID (e.g., imu, my_sensor)
  address: 0x6B # Optional, 0x6B is default
  update_interval: 100ms # Optional, 60s is default
  # Range and ODR configuration (all optional)
  accel_range: 4G # Options: 2G, 4G, 8G, 16G
  gyro_range: 512DPS # Options: 16DPS, 32DPS, 64DPS, 128DPS, 256DPS, 512DPS, 1024DPS, 2048DPS
  accel_odr: 500HZ # Options: 8000HZ, 4000HZ, 2000HZ, 1000HZ, 500HZ, 250HZ, 125HZ, 62.5HZ, 31.25HZ
  gyro_odr: 500HZ # Options: 8000HZ, 4000HZ, 2000HZ, 1000HZ, 500HZ, 250HZ, 125HZ, 62.5HZ, 31.25HZ
  #
  # Fires once when motion is detected (leading edge only)
  on_motion:
    threshold: 0.5 # Optional, m/s² deviation from gravity (default: 0.5)
    then:
      - logger.log: "Motion detected!"

  # Fires when device orientation changes
  on_orientation_change:
    then:
      - logger.log:
          format: "Orientation changed to: %s"
          args: ['orientation.c_str()']
      # - lvgl.label.update: 
      #     id: lbl_orient
      #     text:
      #       format: "%s"
      #       args: ['orientation.c_str()']

pca9554:
  - id: 'pca9554a_device'
    address: 0x20

#################
# QMI8658 device
# https://github.com/Djelibeybi/esphome-qmi8658
sensor:
  - platform: qmi8658
    qmi8658_id: imu_sensor # Reference to the component
    # Accelerometer outputs (m/s²)
    accel_x:
      name: "Accelerometer X"                
    accel_y:
      name: "Accelerometer Y"
    accel_z:
      name: "Accelerometer Z"
    # Gyroscope outputs (°/s)
    gyro_x:
      name: "Gyroscope X"
    gyro_y:
      name: "Gyroscope Y"
    gyro_z:
      name: "Gyroscope Z"
    # Temperature (°C)
    temperature:
      name: "IMU Temperature"
    # Tilt angles (degrees)
    pitch:
      name: "Pitch"
      # on_value:
      #   then:
      #     - lvgl.label.update: 
      #         id: pitch_value
      #         text:
      #           format: "%.1f" 
      #           args: [ 'x' ]   
      #     - lvgl.arc.update:
      #         id: arc_pitch
      #         value: !lambda return int(x);
    roll:
      name: "Roll"
      # on_value:
      #   then:
      #     - lvgl.label.update: 
      #         id: roll_value
      #         text:
      #           format: "%.1f" 
      #           args: [ 'x' ]   
      #     - lvgl.arc.update:
      #         id: arc_roll
      #         value: !lambda return int(x);
              
  #Reports the WiFi signal strength/RSSI in dB
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # WiFi signal in %
    source_id: wifi_signal_db
    id: wifi_signal_pct
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    
###################################
# Sensor for Media Plyaer
###################################
  - platform: homeassistant
    name: "Media Volume"
    id: media_player_volume_sensor
    entity_id: media_player.my_player
    attribute: volume_level
    on_value:
      - logger.log:
          level: INFO
          format: "media_player.my_player: %f"
          args: ['x']
      - lvgl.slider.update:
          id: media_volume_slider
          value: !lambda "return x * 100.0;"


# Binary sensor platform
binary_sensor:
