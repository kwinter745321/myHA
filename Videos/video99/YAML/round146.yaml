############################

text_sensor:
  - platform: template
    name: "Device Name"
    id: device_name
    lambda: |-
      return App.get_name().c_str();
  - platform: wifi_info
    ip_address:
      name: "Device IP"
      id: device_ip_address
      on_value:
        then:
          # - lvgl.label.update:
          #     id: addr_label
          #     text:
          #       format: "IP: %s"
          #       args: [ 'id(device_ip_address).state.c_str()' ]
          - lvgl.label.update:
              id: device_label
              text:
                format: "%s"
                args: [ 'id(device_name).state.c_str()' ]
          # - lvgl.label.update:
          #     id: device_label2
          #     text:
          #       format: "%s"
          #       args: [ 'id(device_name).state.c_str()' ]
          
###########################################
# Text Sensor for Voice Assistant
##########################################
  - id: text_request
    platform: template
    on_value:
      - lambda: |-
          if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
          }
      - lvgl.label.update:
          id: lbl_request
          text:
            format: "%s"
            args: [ 'id(text_request).state.c_str()' ]

  - id: text_response
    platform: template
    on_value:
      - lambda: |-
          if(id(text_response).state.length()>32) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_response).state = (truncated+"...").c_str();
          }
      # - lvgl.label.update:
      #     id: lbl_listen  #lbl_respond
      #     text:
      #       format: "%s"
      #       args: [ 'id(text_request).state.c_str()' ]

#############################################################
#  Text object for Voice ToDo Custom Command and LVGL Widget
############################################################

text:
  - platform: template
    id: work_text
    name: "Work Text"
    mode: TEXT
    restore_value: false
    optimistic: true
    # When HA sets a new value , update the LVGL label
    on_value:
      then:
        - lvgl.label.update: 
            id: work_label
            text: !lambda |-
              return id(work_text).state.c_str();

############################################
# Components for the ESP32-S3 Display
############################################
              
output:
  - platform: ledc
    pin: GPIO5
    id: backlight

light:
  - platform: monochromatic
    id: screen_backlight
    output: backlight
    name: "backlight" 
    restore_mode: ALWAYS_ON

spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  interface: spi2
  data_pins:
    - number: 46
      ignore_strapping_warning: true
    - number: 45
      ignore_strapping_warning: true
    - 42
    - 41

display:
  - platform: qspi_dbi
    model: CUSTOM
    data_rate: 10MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    dimensions:
      height: 412
      width: 412     
    cs_pin: GPIO21
    reset_pin: 
      pca9554: pca9554a_device
      number: 1     
    auto_clear_enabled: false #set to false for LVGL    
    spi_mode: 0       
    draw_rounding: 4 
    #show_test_card: true  
    init_sequence: $INIT_SEQUENCE

############################

# touch  is spd2010_glue below
# https://github.com/coofercat/waveshare-lcd-1.46-touch/tree/main

# This provides touch events. You can use on_swipe_left/on_swipe_right
# and so on in lvgl to handle touch events.
spd2010_glue:
  id: touch_glue
  width: 412
  height: 412
  int_gpio: 4       # plain integer; we handle GPIO internally
  swap_xy: false
  mirror_x: true
  mirror_y: true


##############################
# LVGL YAML for the Display
##############################
              
lvgl:
  buffer_size: 25%
  rotation: 180
  displays:
    main_display
  theme:
    id: my_theme
    dark_mode: true
    label:
      text_font: montserrat_22
      text_color: 0xffffff
    button:
      bg_color: 0x0000ff
  pages:
    - id: page_main
      on_swipe_left:
        then:
          - lvgl.label.update:
              id: lbl_request
              text: ""
          # - lvgl.label.update:
          #     id: lbl_respond
          #     text: ""
      bg_color: 0x000000
      pad_all: 0
      widgets:
        - label:
            id: device_label
            x: 0
            y: 10
            width: 412
            height: 40
            text: "title"
            text_color: 0x3498DB
            text_align: CENTER
            text_font: montserrat_24

        - label:
            id: lbl_time
            x: 0
            y: 40
            width: 190
            height: 55
            align: TOP_MID
            text_align: CENTER
            text_color: 0xFFFF00
            text_font: montserrat_40

        - label:
            id: work_label
            x: 0
            y: -20
            width: 160
            height: 170
            align: CENTER
            text: "---" 
            text_font: montserrat_20
            text_color: 0xffffff
            max_width: 223
            long_mode: SCROLL_CIRCULAR
            bg_color: 0xc0c0c0
            bg_opa: 50%
            pad_all: 5
            radius: 5
            
        - label:
            id: lbl_request
            x: 0
            y: -50
            width: 300
            height: 70
            align: BOTTOM_MID
            text: "..."
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: montserrat_24

        - label:
            id: lbl_listen
            x: 0
            y: -30
            width: 300
            height: 35
            align: BOTTOM_MID
            text: "Standby"
            text_align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_20

        - label:
            id: lbl_btn_listen
            align_to: 
              id: btn_wake
              align: OUT_TOP_MID
              x: 0
              y: -10
            width: 90
            height: 35
            text: "Listen:"
            text_color: 0xFFFFFF
            text_font: montserrat_24

        - button:
            id: btn_wake
            x: 10
            y: 220
            width: 90
            height: 70
            bg_color: 0x003366
            widgets:
              - label:
                  text: "\uF011"
                  id: lbl_flag
                  align: CENTER
                  text_align: CENTER
                  text_font: montserrat_36
                  text_color: 0xD30000              
            on_click:
              - if:
                  condition: micro_wake_word.is_running
                  then:
                    - micro_wake_word.stop:
                    - voice_assistant.stop: 
                    - lvgl.label.update: 
                        id: lbl_flag
                        text: "\uF011"
                        text_color: 0xD30000
                    - lvgl.label.update: 
                        id: lbl_listen
                        text: " "
                  else:
                    - micro_wake_word.start:
                    - lvgl.label.update: 
                        id: lbl_flag
                        text: "\uF011"
                        text_color: 0x3BB143      

        - label:
            id: lbl_slider_icon
            height: 40px
            align_to:
              id: media_volume_slider
              align: OUT_BOTTOM_MID
              x: 0
              y: 10
            text: "\uF028"
            text_color: 0xffffff
            text_font: montserrat_28
            
        - label:
            id: lbl_slider_value
            height: 40px
            align_to:
              id: media_volume_slider
              align: OUT_TOP_MID
              x: -10
              y: -10
            text: "95"
            text_color: 0xffffff
            text_font: montserrat_24
            
        - slider:
            id: media_volume_slider
            x: -45
            y: 0
            width: 30
            height: 150
            align: RIGHT_MID
            min_value: 0
            max_value: 100
            value: 95
            #adv_hittest: true  # for accurate touch
            bg_color: 0x2C3E50          # Dark background color
            bg_opa: COVER
            indicator:
              bg_color: 0x3498DB          # Bright blue indicator color
            knob:
              bg_color: 0x00FF00
            on_value:
              - lvgl.label.update:
                  id: lbl_slider_value
                  text:
                    format: "%d"
                    args: [int(x)]
            on_release:
              - logger.log:
                  level: INFO
                  format: "esp32 slider: %f"
                  args: ['x']
              - speaker.volume_set:
                  id: i2s_audio_speaker
                  volume: !lambda "return x/100;"
              - homeassistant.action:
                  action: media_player.volume_set
                  data:
                    entity_id: media_player.my_player
                  data_template:
                    volume_level: !lambda return (x / 100.0);
              # - homeassistant.action:
              #     action: tts.speak
              #     data:
              #       media_player_entity_id: media_player.my_player
              #       message: "Your volume has been updated."
#############################################
